title: Ollie
description: Personal site, writing, and small web experiments.
url: ""
baseurl: ""
markdown: kramdown
permalink: /blog/:title/
timezone: Europe/London

collections:
  apps:
    output: true
    permalink: /apps/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post

plugins:
  - jekyll-feed
